<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROMS // pico-8 console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --p8-blue:#29adff; --p8-red:#ff004d; --p8-green:#00e436;
    --p8-yellow:#ffec27; --p8-dark:#1d2b53; --bg:#07080c;
    --pixel:'Press Start 2P',monospace; --term:'VT323',monospace;
  }
  *{box-sizing:border-box}
  html,body{
    margin:0; min-height:100%;
    background:radial-gradient(120% 90% at 50% -10%,#14203f 0%,var(--bg) 55%),var(--bg);
    color:#cdd6e6; font-family:var(--term);
  }
  body::before{
    content:''; position:fixed; inset:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(41,173,255,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(41,173,255,.05) 1px,transparent 1px);
    background-size:40px 40px;
    -webkit-mask-image:radial-gradient(120% 80% at 50% 0%,#000 30%,transparent 80%);
    mask-image:radial-gradient(120% 80% at 50% 0%,#000 30%,transparent 80%);
  }
  main{max-width:940px; margin:0 auto; padding:28px 20px 48px; position:relative; z-index:1}

  header{text-align:center; margin-bottom:22px}
  h1{
    font-family:var(--pixel); font-size:30px; margin:0; color:#fff; letter-spacing:2px;
    text-shadow:0 0 14px rgba(41,173,255,.6),3px 3px 0 var(--p8-dark);
  }
  h1 .dash{color:var(--p8-red)}
  .tag{margin:8px 0 0; font-size:22px; color:var(--p8-blue); opacity:.8}

  .layout{display:flex; flex-direction:column; gap:22px; align-items:center}

  /* ---- console device ---- */
  .device{
    width:min(860px,94vw); margin:0 auto;
    background:linear-gradient(150deg,#2b3142 0%,#171a23 60%,#0f1118 100%);
    border:1px solid #05060a; border-radius:22px; padding:20px;
    box-shadow:0 26px 70px rgba(0,0,0,.6),inset 0 2px 0 rgba(255,255,255,.06),inset 0 -3px 12px rgba(0,0,0,.5);
  }
  .topbar{
    display:flex; justify-content:space-between; align-items:center;
    font-family:var(--pixel); font-size:9px; color:#9fb0cc; padding:2px 6px 12px; letter-spacing:1px;
  }
  .brand b{color:var(--p8-blue)}
  .power{display:flex; align-items:center; gap:6px}
  .led{
    width:8px; height:8px; border-radius:50%; background:var(--p8-green);
    box-shadow:0 0 8px var(--p8-green); animation:pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

  .screen{
    position:relative; aspect-ratio:1/1; background:#000; border-radius:14px; overflow:hidden;
    box-shadow:inset 0 0 36px rgba(0,0,0,.95),0 0 0 10px #0a0b10,0 0 0 12px #30374a,0 0 0 13px #05060a;
  }
  .screen iframe{position:absolute; inset:0; width:100%; height:100%; border:0; display:block}
  .crt{
    position:absolute; inset:0; pointer-events:none; mix-blend-mode:multiply;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.22) 2px 3px);
  }
  .crt::after{
    content:''; position:absolute; inset:0; border-radius:14px;
    background:radial-gradient(118% 118% at 50% 50%,transparent 58%,rgba(0,0,0,.6));
  }
  .glare{
    position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,transparent 34%);
  }

  .plate{display:flex; align-items:center; gap:10px; margin-top:14px; padding:0 6px}
  .dot{width:12px; height:12px; border-radius:50%; background:var(--p8-blue); box-shadow:0 0 10px var(--p8-blue)}
  .now{font-family:var(--pixel); font-size:10px; color:var(--p8-yellow); letter-spacing:1px}
  .speaker{
    flex:1; height:12px; margin-left:6px; border-radius:3px; opacity:.8;
    background:repeating-linear-gradient(90deg,#0c0e14 0 3px,#1b2030 3px 6px);
  }

  /* ---- cartridge shelf ---- */
  .shelf{
    width:min(860px,94vw); margin:0 auto;
    background:linear-gradient(160deg,#161a25,#0d0f16);
    border:1px solid #05060a; border-radius:16px; padding:14px 16px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 40px rgba(0,0,0,.4);
  }
  .shelf h2{font-family:var(--pixel); font-size:11px; color:#8da0c0; margin:2px 2px 12px; letter-spacing:1px}
  .shelf ul{
    list-style:none; margin:0; padding:2px 2px 8px; display:flex; gap:12px;
    overflow-x:auto; scrollbar-width:thin; scrollbar-color:#2a3046 transparent;
  }
  .shelf ul::-webkit-scrollbar{height:8px}
  .shelf ul::-webkit-scrollbar-thumb{background:#2a3046; border-radius:8px}
  .shelf li{flex:0 0 auto}
  .shelf button{
    display:flex; flex-direction:column; gap:9px; width:170px; text-align:left; padding:10px;
    background:#11131b; border:1px solid #262c3c; border-radius:10px; color:#cdd6e6; cursor:pointer;
    transition:border-color .15s,box-shadow .15s,transform .05s;
  }
  .shelf button:hover{border-color:var(--c)}
  .shelf button:active{transform:translateY(1px)}
  .shelf button.active{border-color:var(--c); box-shadow:0 0 0 1px var(--c),0 0 16px -3px var(--c)}
  .cart{
    position:relative; width:100%; height:60px; border-radius:6px 6px 3px 3px;
    background:var(--c); box-shadow:inset 0 0 0 2px rgba(0,0,0,.25),inset -8px -8px 0 rgba(0,0,0,.12);
    overflow:hidden;
  }
  .cart .top{position:absolute; top:0; left:14px; right:14px; height:10px; background:rgba(0,0,0,.28); border-radius:0 0 4px 4px}
  .cart .strip{position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:54px; height:20px; background:#0c0e14; border-radius:3px}
  .meta{display:flex; flex-direction:column; gap:3px; min-width:0}
  .meta .name{font-family:var(--pixel); font-size:8px; color:#fff; letter-spacing:.5px; line-height:1.3}
  .meta .blurb{font-size:15px; color:#8da0c0; line-height:1.05}
  .soon{
    display:flex; align-items:center; justify-content:center; text-align:center;
    width:120px; font-size:16px; color:#4a5570; padding:8px;
    border:1px dashed #262c3c; border-radius:10px;
  }

  footer{margin-top:26px; display:flex; gap:26px; justify-content:center; font-size:20px; color:#8da0c0}
  footer b{color:var(--p8-yellow)}
</style>
</head>
<body>
<main>
  <header>
    <h1>ROMS<span class="dash">-</span>8</h1>
    <p class="tag">// retro cartridge console</p>
  </header>

  <div class="layout">
    <aside class="shelf">
      <h2>cartridges</h2>
      <ul id="shelf"></ul>
    </aside>

    <section class="device">
      <div class="topbar">
        <span class="brand">ROMS<b>-8</b></span>
        <span class="power"><span class="led"></span> PWR</span>
      </div>
      <div class="screen">
        <iframe id="screen" title="game" allow="autoplay; fullscreen; gamepad"></iframe>
        <div class="crt"></div>
        <div class="glare"></div>
      </div>
      <div class="plate">
        <span id="nowDot" class="dot"></span>
        <span id="nowName" class="now">—</span>
        <span class="speaker"></span>
      </div>
    </section>
  </div>

  <footer>
    <span><b>arrows</b> move</span>
    <span><b>z / x</b> action</span>
    <span><b>enter</b> menu</span>
  </footer>
</main>

<script>
  // --- cartridge library: add an entry per exported game ---
  const carts = [
    {
      id: 'tunnel',
      title: 'TUNNEL RUNNER',
      blurb: 'Hack the Guild wormholes. Dodge, shoot, descend.',
      src: 'carts/tunnel/index.html',
      color: '#29adff',
    },
    {
      id: 'redhorizon',
      title: 'RED HORIZON',
      blurb: 'Real-time Mars artillery duel. Mine, refine, fire.',
      src: 'carts/redhorizon/index.html',
      color: '#ff004d',
    },
    {
      id: 'mvcore',
      title: 'METROIDVANIA (WIP)',
      blurb: 'Run, dash, fight a boss in the dark. Work in progress.',
      src: 'carts/mvcore/index.html',
      color: '#00e436',
    },
  ];

  const shelf  = document.getElementById('shelf');
  const screen = document.getElementById('screen');
  const nowName = document.getElementById('nowName');
  const nowDot  = document.getElementById('nowDot');

  function load(cart) {
    if (screen.dataset.id === cart.id) return;
    screen.dataset.id = cart.id;
    screen.src = cart.src;
    nowName.textContent = cart.title;
    nowDot.style.background = cart.color;
    nowDot.style.boxShadow = '0 0 10px ' + cart.color;
    for (const b of shelf.querySelectorAll('button'))
      b.classList.toggle('active', b.dataset.id === cart.id);
  }

  for (const cart of carts) {
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.dataset.id = cart.id;
    btn.style.setProperty('--c', cart.color);
    btn.innerHTML =
      '<span class="cart"><span class="top"></span><span class="strip"></span></span>' +
      '<span class="meta"><span class="name">' + cart.title + '</span>' +
      '<span class="blurb">' + cart.blurb + '</span></span>';
    btn.addEventListener('click', () => load(cart));
    li.appendChild(btn);
    shelf.appendChild(li);
  }
  const soon = document.createElement('li');
  soon.className = 'soon';
  soon.textContent = '+ more soon…';
  shelf.appendChild(soon);

  load(carts[0]);
</script>
</body>
</html>
